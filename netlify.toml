# ─────────────────────────────────────────
# ALQIA — Netlify configuration
# ─────────────────────────────────────────

[build]
  publish = "."

# SPA routing — todas las rutas sirven index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Headers de caché y seguridad ─────────

# HTML — sin caché (siempre fresco)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control          = "public, max-age=0, must-revalidate"
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# CSS y JS — caché larga (1 año)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes — caché larga + CORS
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control               = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Imágenes — caché media (1 semana)
[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
